      <path fill="#000" d="M373 423c0-145 96-234 227-234s227 89 227 234c0 37-22 58-63 58H436c-41 0-63-21-63-58Z"/>
    </mask>
    <mask id="soft-window">
      <rect width="1200" height="720" fill="#000"/>
      <ellipse cx="600" cy="392" rx="432" ry="304" fill="#fff"/>
    </mask>
  </defs>

  <rect width="1200" height="720" fill="url(#field)"/>
  <rect width="1200" height="720" filter="url(#grain)" opacity="0.75"/>

