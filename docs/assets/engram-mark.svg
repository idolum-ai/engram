<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Engram</title>
  <desc id="desc">A field of fine signals bends around a dark terminal aperture and resolves into a luminous readable plane.</desc>
  <defs>
    <radialGradient id="field" cx="50%" cy="39%" r="76%">
      <stop offset="0" stop-color="#252521"/>
      <stop offset="0.48" stop-color="#121210"/>
      <stop offset="1" stop-color="#050504"/>
    </radialGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#817f77"/>
      <stop offset="0.52" stop-color="#d9d5ca"/>
      <stop offset="1" stop-color="#fffdf5"/>
    </linearGradient>
    <linearGradient id="plane-signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#77756f" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#ddd9ce" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#fffdf5"/>
      <stop offset="0.82" stop-color="#ddd9ce" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#77756f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="aperture" cx="50%" cy="82%" r="88%">
      <stop offset="0" stop-color="#0c0c0a"/>
      <stop offset="0.58" stop-color="#070706"/>
      <stop offset="1" stop-color="#020202"/>
    </radialGradient>
    <radialGradient id="edge-fade" cx="50%" cy="44%" r="68%">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.72" stop-color="#fff"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <filter id="grain" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="3" seed="31"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
    <filter id="fray" x="-4%" y="-5%" width="108%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.055" numOctaves="2" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <mask id="fade-mask">
      <rect width="1200" height="680" fill="url(#edge-fade)"/>
    </mask>
    <mask id="aperture-cut">
      <rect width="1200" height="680" fill="#fff"/>
      <path fill="#000" d="M359 393c0-145 97-232 241-232s241 87 241 232c0 43-24 66-69 66H428c-45 0-69-23-69-66Z"/>
    </mask>
    <clipPath id="plane-clip">
      <path d="M34 448h1132v164H34z"/>
    </clipPath>

    <!-- Unit-height streamline. matrix(1 0 0 lift 0 baseline) places each contour. -->
    <path id="stream" pathLength="1" vector-effect="non-scaling-stroke" d="M-70 0H242c72 0 94-.06 111-.28C390-.75 481-1 600-1s210 .25 247 .72c17 .22 39 .28 111 .28h312"/>
    <path id="plane-line" pathLength="1" vector-effect="non-scaling-stroke" d="M0 0C180-3 340 2 600 0s420-2 600 0"/>
  </defs>

  <rect width="1200" height="680" fill="url(#field)"/>
  <rect width="1200" height="680" filter="url(#grain)" opacity="0.78"/>

  <g mask="url(#fade-mask)">
    <g mask="url(#aperture-cut)" fill="none" stroke="url(#signal)" stroke-linecap="round" vector-effect="non-scaling-stroke" filter="url(#fray)">
      <use href="#stream" transform="matrix(1 0 0 8 0 76)" stroke-width="1.1" opacity="0.42"/>
      <use href="#stream" transform="matrix(1 0 0 10 0 87)" stroke-width="1.1" opacity="0.45"/>
      <use href="#stream" transform="matrix(1 0 0 12 0 98)" stroke-width="1.1" opacity="0.48"/>
      <use href="#stream" transform="matrix(1 0 0 14 0 109)" stroke-width="1.15" opacity="0.51"/>
      <use href="#stream" transform="matrix(1 0 0 16 0 120)" stroke-width="1.15" opacity="0.54"/>
      <use href="#stream" transform="matrix(1 0 0 18 0 131)" stroke-width="1.15" opacity="0.57"/>
      <use href="#stream" transform="matrix(1 0 0 20 0 142)" stroke-width="1.2" opacity="0.6"/>
      <use href="#stream" transform="matrix(1 0 0 22 0 153)" stroke-width="1.2" opacity="0.63"/>
      <use href="#stream" transform="matrix(1 0 0 24 0 164)" stroke-width="1.2" opacity="0.66"/>
      <use href="#stream" transform="matrix(1 0 0 28 0 175)" stroke-width="1.25" opacity="0.69"/>
      <use href="#stream" transform="matrix(1 0 0 37 0 186)" stroke-width="1.25" opacity="0.72"/>
      <use href="#stream" transform="matrix(1 0 0 46 0 197)" stroke-width="1.25" opacity="0.75"/>
      <use href="#stream" transform="matrix(1 0 0 55 0 208)" stroke-width="1.3" opacity="0.78"/>
      <use href="#stream" transform="matrix(1 0 0 64 0 219)" stroke-width="1.3" opacity="0.81"/>
      <use href="#stream" transform="matrix(1 0 0 73 0 230)" stroke-width="1.3" opacity="0.84"/>
      <use href="#stream" transform="matrix(1 0 0 82 0 241)" stroke-width="1.35" opacity="0.87"/>
      <use href="#stream" transform="matrix(1 0 0 91 0 252)" stroke-width="1.35" opacity="0.89"/>
      <use href="#stream" transform="matrix(1 0 0 100 0 263)" stroke-width="1.4" opacity="0.91"/>
      <use href="#stream" transform="matrix(1 0 0 109 0 274)" stroke-width="1.4" opacity="0.93"/>
      <use href="#stream" transform="matrix(1 0 0 118 0 285)" stroke-width="1.45" opacity="0.95"/>
      <use href="#stream" transform="matrix(1 0 0 127 0 296)" stroke-width="1.45" opacity="0.96"/>
      <use href="#stream" transform="matrix(1 0 0 136 0 307)" stroke-width="1.5" opacity="0.97"/>
      <use href="#stream" transform="matrix(1 0 0 145 0 318)" stroke-width="1.5" opacity="0.98"/>
      <use href="#stream" transform="matrix(1 0 0 154 0 329)" stroke-width="1.55" opacity="0.99"/>
      <use href="#stream" transform="matrix(1 0 0 163 0 340)" stroke-width="1.55"/>
      <use href="#stream" transform="matrix(1 0 0 172 0 351)" stroke-width="1.6"/>
      <use href="#stream" transform="matrix(1 0 0 181 0 362)" stroke-width="1.65"/>
      <use href="#stream" transform="matrix(1 0 0 190 0 373)" stroke-width="1.7"/>
      <use href="#stream" transform="matrix(1 0 0 199 0 384)" stroke-width="1.75"/>
      <use href="#stream" transform="matrix(1 0 0 208 0 395)" stroke-width="1.8"/>
      <use href="#stream" transform="matrix(1 0 0 217 0 406)" stroke-width="1.85"/>
      <use href="#stream" transform="matrix(1 0 0 226 0 417)" stroke-width="1.9"/>
      <use href="#stream" transform="matrix(1 0 0 235 0 428)" stroke-width="1.95"/>
      <use href="#stream" transform="matrix(1 0 0 244 0 439)" stroke-width="2"/>
      <use href="#stream" transform="matrix(1 0 0 253 0 450)" stroke-width="2.05"/>
      <use href="#stream" transform="matrix(1 0 0 262 0 461)" stroke-width="2.1"/>
    </g>

    <g clip-path="url(#plane-clip)" fill="none" stroke="url(#plane-signal)" stroke-linecap="round" vector-effect="non-scaling-stroke" filter="url(#fray)">
      <use href="#plane-line" transform="matrix(.39 0 0 1 366 463)" stroke-width="5.2"/>
      <use href="#plane-line" transform="matrix(.44 0 0 1 336 474)" stroke-width="4.7"/>
      <use href="#plane-line" transform="matrix(.49 0 0 1 306 486)" stroke-width="4.2"/>
      <use href="#plane-line" transform="matrix(.54 0 0 1 276 499)" stroke-width="3.8"/>
      <use href="#plane-line" transform="matrix(.59 0 0 1 246 513)" stroke-width="3.4"/>
      <use href="#plane-line" transform="matrix(.64 0 0 1 216 528)" stroke-width="3.1"/>
      <use href="#plane-line" transform="matrix(.69 0 0 1 186 544)" stroke-width="2.8"/>
      <use href="#plane-line" transform="matrix(.74 0 0 1 156 561)" stroke-width="2.5"/>
      <use href="#plane-line" transform="matrix(.79 0 0 1 126 579)" stroke-width="2.2"/>
      <use href="#plane-line" transform="matrix(.84 0 0 1 96 598)" stroke-width="1.9"/>
    </g>
  </g>

  <path fill="url(#aperture)" d="M359 393c0-145 97-232 241-232s241 87 241 232c0 43-24 66-69 66H428c-45 0-69-23-69-66Z"/>
  <path d="M391 459c119 11 299 11 418 0" fill="none" stroke="#fffdf5" stroke-width="2" opacity="0.9"/>
  <rect x="215" y="616" width="770" height="1.25" fill="url(#plane-signal)" opacity="0.62"/>

  <text x="600" y="658" text-anchor="middle" fill="#85827b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" letter-spacing="17">ENGRAM</text>
</svg>
