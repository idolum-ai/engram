<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Engram monochrome aperture mark</title>
  <desc id="desc">A dark field with off-white moire lines bending around a quiet terminal-shaped aperture.</desc>
  <defs>
    <radialGradient id="field" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="0.5" stop-color="#10100e"/>
      <stop offset="1" stop-color="#050504"/>
    </radialGradient>
    <radialGradient id="signal" cx="50%" cy="48%" r="48%">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset="0.76" stop-color="#e8e4d6"/>
      <stop offset="1" stop-color="#96938a"/>
    </radialGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" seed="19"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="base-fade">
      <path d="M180 585h840v-56c-86-35-186-53-300-53H480c-114 0-214 18-300 53v56Z"/>
    </clipPath>
    <mask id="aperture-cut">
