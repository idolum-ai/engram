name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: engram-release
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
      RELEASE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      RELEASE_TITLE: ${{ github.event.pull_request.title }}
      RELEASE_BODY: ${{ github.event.pull_request.body }}
      RELEASE_URL: ${{ github.event.pull_request.html_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep tmux

      - name: Resolve release
        id: release
        run: |
          set -euo pipefail
          tag="${RELEASE_BRANCH#release/}"
          if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "release branch must match release/vX.Y.Z; got '${RELEASE_BRANCH}'" >&2
            exit 1
          fi
          grep -F "## [${tag}]" CHANGELOG.md >/dev/null || {
            echo "CHANGELOG.md is missing a heading for ${tag}" >&2
            exit 1
          }
          if [[ -z "${RELEASE_BODY//[[:space:]]/}" ]]; then
            echo "release PR body must contain reviewed release notes" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists; refusing to overwrite it" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Full gate
        run: make check

      - name: Real tmux integration
        run: ENGRAM_TMUX_INTEGRATION=1 go test ./internal/tmux -run TestCaptureStyledJoinsMarkerInNarrowRealPane -count=1

      - name: Build release assets
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          commit="$(git rev-parse --short=12 "${RELEASE_SHA}")"
          build_date="$(git show -s --format=%cI "${RELEASE_SHA}")"
          make release-dist VERSION="${TAG}" COMMIT="${commit}" DATE="${build_date}"
          mkdir -p release-smoke
          tar -xzf "dist/engram-${TAG}-linux-amd64.tar.gz" -C release-smoke engram
          release-smoke/engram version | tee release-version.txt
          grep -F "engram ${TAG} commit=${commit}" release-version.txt >/dev/null

      - name: Prepare release notes
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          {
            printf '# %s\n\n' "${TAG}"
            printf 'Release PR: [%s](%s)\n\n' "${RELEASE_TITLE}" "${RELEASE_URL}"
            printf '%s\n' "${RELEASE_BODY}"
          } > release-notes.md

      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${RELEASE_SHA}" \
            --title "${TAG}" \
            --notes-file release-notes.md
