name: Release Candidate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Candidate version (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

jobs:
  candidate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep tmux

      - name: Resolve candidate and publication notes
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          INPUT_VERSION: ${{ inputs.version }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_VERSION}"
          else
            tag="${HEAD_REF#release/}"
          fi
          tag="$(./scripts/validate-release-version.sh "${tag}")"
          prefix="## [${tag}] - "
          heading="$(awk -v prefix="${prefix}" 'index($0, prefix) == 1 { print; exit }' CHANGELOG.md)"
          release_date="${heading#"${prefix}"}"
          [[ "${heading}" == "${prefix}"* && "${release_date}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || {
            echo "CHANGELOG.md is missing a dated heading for ${tag}" >&2
            exit 1
          }
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            printf '%s\n' "${PR_BODY}" > release-notes-source.md
            ./scripts/prepare-release-notes.sh "${tag}" "${PR_TITLE}" "${PR_URL}" \
              release-notes-source.md release-notes-preview.md
          else
            ./scripts/generate-release-notes.sh --to HEAD \
              --output release-notes-preview.md --title "${tag}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Full gate
        run: make check

      - name: Real tmux integration
        run: ENGRAM_TMUX_INTEGRATION=1 go test ./internal/tmux -run '^TestTmuxIntegration' -count=1

      - name: Package candidate
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          commit="$(git rev-parse --short=12 HEAD)"
          build_date="$(git show -s --format=%cI HEAD)"
          make release-dist VERSION="${TAG}" COMMIT="${commit}" DATE="${build_date}"
          mkdir -p candidate-smoke
          tar -xzf "dist/engram-${TAG}-linux-amd64.tar.gz" -C candidate-smoke engram
          candidate-smoke/engram version | tee candidate-version.txt
          grep -F "engram ${TAG} commit=${commit}" candidate-version.txt >/dev/null

      - name: Show publication notes preview
        run: cat release-notes-preview.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload candidate evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: engram-${{ steps.version.outputs.tag }}-candidate
          path: |
            dist/*
            candidate-version.txt
            release-notes-preview.md
