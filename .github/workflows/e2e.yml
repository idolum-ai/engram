name: Manual E2E

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Full same-repository commit SHA to test
        required: true
        type: string
      suite:
        description: End-to-end suite to run
        required: true
        default: hermetic
        type: choice
        options:
          - hermetic

permissions:
  contents: read

concurrency:
  group: manual-e2e-${{ inputs.target_sha }}
  cancel-in-progress: false

jobs:
  hermetic:
    name: Hermetic golden path
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Validate trusted dispatch
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          [[ "${TARGET_SHA}" =~ ^[0-9a-f]{40}$ ]]

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.target_sha }}

      - name: Verify target checkout
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: test "$(git rev-parse HEAD)" = "${TARGET_SHA}"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 1.22.12
          cache: false

      - name: Install runtime tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep tmux

      - name: Build Engram
        run: make build

      - name: Run hermetic golden path
        env:
          E2E_SUITE: ${{ inputs.suite }}
        run: |
          set -euo pipefail
          test "${E2E_SUITE}" = "hermetic"
          mkdir -p e2e-artifacts
          : > e2e-artifacts/process.log
          trap 'status=$?; if [[ ! -f e2e-artifacts/process.log ]]; then : > e2e-artifacts/process.log; fi; if [[ ! -f e2e-artifacts/manifest.json ]]; then printf "%s\n" "{\"suite\":\"hermetic\",\"status\":\"failed\",\"assertions\":[],\"failure\":\"workflow failed before test evidence\"}" > e2e-artifacts/manifest.json; fi; exit "${status}"' EXIT
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          test -n "${browser}"
          set +e
          ENGRAM_E2E=1 \
            ENGRAM_E2E_BINARY="${PWD}/bin/engram" \
            ENGRAM_E2E_ARTIFACT_DIR="${PWD}/e2e-artifacts" \
            ENGRAM_SNAPSHOT_BROWSER="${browser}" \
            go test ./internal/e2e -run '^TestHermeticGoldenPath$' -count=1 -timeout=2m -v 2>&1 | tee e2e-artifacts/test.log
          test_status=${PIPESTATUS[0]}
          set -e
          test -f e2e-artifacts/manifest.json
          if (( test_status != 0 )); then
            exit "${test_status}"
          fi
          {
            echo "## Hermetic E2E"
            echo
            echo "The real Engram process, tmux, and Chromium completed the scripted Telegram golden path."
            echo "No Telegram credentials, model credentials, or external application services were used."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: engram-hermetic-e2e-${{ github.run_id }}
          path: e2e-artifacts
          if-no-files-found: error
          retention-days: 30
