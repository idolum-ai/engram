name: Manual E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: End-to-end suite to run
        required: true
        default: hermetic
        type: choice
        options:
          - hermetic

permissions:
  contents: read

concurrency:
  group: manual-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hermetic:
    name: Hermetic golden path
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install runtime tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ripgrep tmux

      - name: Build Engram
        run: make build

      - name: Run hermetic golden path
        env:
          E2E_SUITE: ${{ inputs.suite }}
        run: |
          set -euo pipefail
          test "${E2E_SUITE}" = "hermetic"
          bash scripts/check-workflows.sh
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          test -n "${browser}"
          mkdir -p e2e-artifacts
          ENGRAM_E2E=1 \
            ENGRAM_E2E_BINARY="${PWD}/bin/engram" \
            ENGRAM_E2E_ARTIFACT_DIR="${PWD}/e2e-artifacts" \
            ENGRAM_SNAPSHOT_BROWSER="${browser}" \
            go test ./internal/e2e -run '^TestHermeticGoldenPath$' -count=1 -v
          {
            echo "## Hermetic E2E"
            echo
            echo "The real Engram process, tmux, and Chromium completed the scripted Telegram golden path."
            echo "No Telegram credentials, model credentials, or external application services were used."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: engram-hermetic-e2e-${{ github.run_id }}
          path: e2e-artifacts
          if-no-files-found: warn
          retention-days: 30
