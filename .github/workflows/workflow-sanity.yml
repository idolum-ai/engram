name: Workflow Sanity

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check workflow and script hygiene
        run: bash scripts/check-workflows.sh
